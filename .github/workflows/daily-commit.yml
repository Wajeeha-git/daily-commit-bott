name: Daily Commit

on:
  schedule:
    - cron: '0 0 * * *'  # Once per day
  workflow_dispatch:

jobs:
  commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Make a daily commit
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          echo "✅ Commit on $(date)" >> activity.log
          git config user.name "Wajeeha"
          git config user.email "47328@students.riphah.edu.pk"
          git add activity.log
          git commit -m "Daily activity update" || echo "Nothing to commit"
          git push https://x-access-token:${GH_PAT}@github.com/${{ github.repository }}.git
