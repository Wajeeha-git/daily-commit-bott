name: Random Commit Bot

on:
  schedule:
    - cron: "17 */4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  random-commits:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate random commits
        run: |
          git config user.name "Wajeeha"
          git config user.email "47328@students.riphah.edu.pk"

          COUNT=$(( ( RANDOM % 15 ) + 1 ))
          echo "Making $COUNT commits now..."

          for ((i=1; i<=COUNT; i++)); do
            echo "Commit $i at $(date -u)" >> activity.log
            git add activity.log
            git commit -m "Random commit $i"
            sleep $(( RANDOM % 10 ))
          done

          git push
