name: Daily Commit

on:
  schedule:
    - cron: '0 0 * * *'  # Runs daily at 12:00 AM UTC (5 AM PKT)
  workflow_dispatch:      # allows manual trigger

jobs:
  commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Make a daily commit
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          echo "✅ Commit on $(date)" >> activity.log
          git config user.name "Your GitHub Name"
          git config user.email "youremail@domain.com"
          git add activity.log
          git commit -m "Daily activity update" || echo "Nothing to commit"
          git push https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git
